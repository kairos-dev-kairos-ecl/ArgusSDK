name: release

# Tag a release to build and publish all artifacts:
#   git tag v1.0.0 && git push origin v1.0.0
#
# Produces (via GoReleaser): cross-platform binaries, .deb/.rpm packages,
# archives (with systemd unit / launchd plist / install scripts), a multi-arch
# container image on GHCR, and a checksums file.
#
# Trust stack is fully FREE (no certificates, no paid services):
#   - Sigstore cosign keyless signing of the checksums file and the container
#     image, using this workflow's GitHub OIDC identity.
#   - SLSA build-provenance attestations for every release artifact, verifiable
#     with `gh attestation verify <file> --repo kairos-dev-kairos-ecl/ArgusSDK`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub Releases
  packages: write # push the container image to GHCR
  id-token: write # OIDC identity for cosign keyless signing + attestations
  attestations: write # record build-provenance attestations

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt
