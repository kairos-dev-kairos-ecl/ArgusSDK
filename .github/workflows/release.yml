name: release

# Tag a release to build and publish all artifacts:
#   git tag v1.0.0 && git push origin v1.0.0
#
# The "goreleaser" job publishes binaries, .deb/.rpm packages, archives, and a
# cosign-signed checksums file, plus SLSA build-provenance attestations. The
# "docker" job builds, pushes, and signs the container image independently, so an
# image issue never blocks the binary/package release.
#
# Trust stack is fully FREE (no certificates, no paid services): Sigstore cosign
# keyless signing + GitHub SLSA provenance, both via the workflow's OIDC identity.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub Releases
  packages: write # push the container image to GHCR
  id-token: write # OIDC identity for cosign keyless signing + attestations
  attestations: write # record build-provenance attestations

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance (release artifacts)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt

  windows-installer:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Download the Windows binary from the draft release
        shell: pwsh
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} -p "argus-agent_*_windows_amd64.zip" -D dl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage installer inputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          $zip = Get-ChildItem dl/*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath build -Force
          Copy-Item config/agent.example.yaml build/agent.yaml
          $v = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content packaging/windows/argus-agent.wxs) -replace '__VERSION__', $v | Set-Content build/argus-agent.wxs

      - name: Install WiX
        # Pin to v5: WiX v6/v7 require accepting the OSMF EULA (error WIX7015),
        # which can't be done non-interactively. v5 uses the same v4 wxs schema.
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          wix build build/argus-agent.wxs -arch x64 -b build -o "argus-agent_${v}_windows_amd64.msi"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign and upload the MSI
        shell: pwsh
        run: |
          $msi = (Get-ChildItem argus-agent_*_windows_amd64.msi | Select-Object -First 1).Name
          cosign sign-blob --yes --output-signature "$msi.sig" --output-certificate "$msi.pem" "$msi"
          gh release upload ${{ github.ref_name }} "$msi" "$msi.sig" "$msi.pem" --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kairos-dev-kairos-ecl/argus-agent
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign image (cosign keyless)
        run: cosign sign --yes ghcr.io/kairos-dev-kairos-ecl/argus-agent@${{ steps.build.outputs.digest }}

      - name: Attest build provenance (image)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/kairos-dev-kairos-ecl/argus-agent
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
