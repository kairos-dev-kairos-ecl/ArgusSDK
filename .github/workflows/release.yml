name: release

# Tag a release to build and publish all artifacts:
#   git tag v1.0.0 && git push origin v1.0.0
#
# The "goreleaser" job publishes binaries, .deb/.rpm packages, archives, and a
# cosign-signed checksums file, plus SLSA build-provenance attestations. The
# "docker" job builds, pushes, and signs the container image independently, so an
# image issue never blocks the binary/package release.
#
# Trust stack is fully FREE (no certificates, no paid services): Sigstore cosign
# keyless signing + GitHub SLSA provenance, both via the workflow's OIDC identity.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub Releases
  packages: write # push the container image to GHCR
  id-token: write # OIDC identity for cosign keyless signing + attestations
  attestations: write # record build-provenance attestations

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance (release artifacts)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kairos-dev-kairos-ecl/argus-agent
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          build-args: VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign image (cosign keyless)
        run: cosign sign --yes ghcr.io/kairos-dev-kairos-ecl/argus-agent@${{ steps.build.outputs.digest }}

      - name: Attest build provenance (image)
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/kairos-dev-kairos-ecl/argus-agent
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
