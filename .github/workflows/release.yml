name: release

# Tag a release to build and publish the Windows artifacts:
#   git tag v1.2.0 && git push origin v1.2.0
#
# Scope: Windows only. Linux/macOS detection is unverified and intentionally not
# published yet (see README "Capabilities"). The "goreleaser" job publishes the
# Windows archive + a cosign-signed checksums file with SLSA provenance; the
# "windows-installer" job builds, signs, and uploads the MSI.
#
# Trust stack is fully FREE: Sigstore cosign keyless signing + GitHub SLSA
# provenance, via the workflow's OIDC identity (no certificates).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create GitHub Releases
  id-token: write # OIDC identity for cosign keyless signing + attestations
  attestations: write # record build-provenance attestations

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance (release artifacts)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            dist/*.zip
            dist/checksums.txt

  windows-installer:
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4

      - name: Download the Windows binary from the draft release
        shell: pwsh
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} -p "argus-agent_*_windows_amd64.zip" -D dl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage installer inputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build | Out-Null
          $zip = Get-ChildItem dl/*.zip | Select-Object -First 1
          Expand-Archive -Path $zip.FullName -DestinationPath build -Force
          Copy-Item config/agent.default.yaml build/agent.yaml
          # The service has no console; enable rotating file logs under ProgramData
          # by activating the commented logging.file line (must stay under the
          # logging: section, so replace the example line rather than append).
          (Get-Content build/agent.yaml) `
            -replace '^\s*#\s*file:\s*"/var/log/argus-agent/agent.log"', '  file: "C:\ProgramData\argus-agent\logs\agent.log"' `
            | Set-Content build/agent.yaml
          $v = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content packaging/windows/argus-agent.wxs) -replace '__VERSION__', $v | Set-Content build/argus-agent.wxs

      - name: Install WiX
        # Pin to v5: WiX v6/v7 require accepting the OSMF EULA (error WIX7015),
        # which can't be done non-interactively. v5 uses the same v4 wxs schema.
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          wix build build/argus-agent.wxs -arch x64 -b build -o "argus-agent_${v}_windows_amd64.msi"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign and upload the MSI
        shell: pwsh
        run: |
          $msi = (Get-ChildItem argus-agent_*_windows_amd64.msi | Select-Object -First 1).Name
          cosign sign-blob --yes --output-signature "$msi.sig" --output-certificate "$msi.pem" "$msi"
          gh release upload ${{ github.ref_name }} "$msi" "$msi.sig" "$msi.pem" --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
