# GoReleaser configuration for argus-agent.
# Local dry run:  goreleaser release --snapshot --clean --skip=publish,sign,notarize
# Validate:       goreleaser check
#
# Signing/notarization run only on `goreleaser release` (a tag build in CI) and
# are gated on the presence of the relevant secrets, so snapshot builds work
# without certificates. See docs/RELEASING.md for the required secrets.
version: 2

project_name: argus-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: argus-agent
    main: ./cmd/argus-agent
    binary: argus-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - argus-agent
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - CHANGELOG.md
      - config/agent.example.yaml
      - packaging/systemd/argus-agent.service
      - packaging/launchd/org.kairos-foundation.argus-agent.plist
      - packaging/macos/install.sh
      - packaging/macos/uninstall.sh

# Native Linux packages: install the binary, the systemd unit, and a default
# config, and create the service user via the maintainer scripts.
nfpms:
  - id: linux-packages
    package_name: argus-agent
    ids:
      - argus-agent
    vendor: Kairos Foundation
    homepage: https://kairos-foundation.org
    maintainer: Kairos Foundation <security@kairos-foundation.org>
    description: |
      Argus SDK Agent — collects LLM and Shadow-AI signals and forwards them to
      ArgusXDR or external SIEM destinations (OCSF).
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/argus-agent.service
        dst: /lib/systemd/system/argus-agent.service
      - src: config/agent.example.yaml
        dst: /etc/argus-agent/agent.yaml
        type: config|noreplace
      - dst: /var/lib/argus-agent
        type: dir
        file_info:
          mode: 0750
    scripts:
      preinstall: packaging/nfpm/preinstall.sh
      postinstall: packaging/nfpm/postinstall.sh
      preremove: packaging/nfpm/preremove.sh

dockers:
  - image_templates:
      - "ghcr.io/kairos-dev-kairos-ecl/argus-agent:{{ .Version }}"
      - "ghcr.io/kairos-dev-kairos-ecl/argus-agent:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"

checksum:
  name_template: "checksums.txt"

# Keyless signing of the checksums file with Sigstore cosign. This is FREE and
# uses the workflow's GitHub OIDC identity — no secrets, no key to manage. It
# emits checksums.txt.sig + checksums.txt.pem, verifiable with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/kairos-dev-kairos-ecl/ArgusSDK/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com checksums.txt
signs:
  - id: cosign-checksum
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Keyless signing of the container image (cosign + OIDC, also free).
docker_signs:
  - id: cosign-image
    cmd: cosign
    args:
      - "sign"
      - "--yes"
      - "${artifact}"
    artifacts: all
    output: true

# Homebrew tap formula — free macOS/Linux CLI install with no Gatekeeper
# friction (brew-installed binaries are not quarantined). The formula is
# generated on every release; pushing to the tap stays OFF until you:
#   1. create the repo  kairos-dev-kairos-ecl/homebrew-tap
#   2. add a PAT secret HOMEBREW_TAP_GITHUB_TOKEN with repo scope
#   3. set skip_upload to "false" and add the repository.token field below
# Until then the formula is built into dist/ for inspection only.
brews:
  - name: argus-agent
    repository:
      owner: kairos-dev-kairos-ecl
      name: homebrew-tap
    skip_upload: "true"
    homepage: "https://kairos-foundation.org"
    description: "Argus SDK Agent — LLM and Shadow-AI signal collection and forwarding"
    license: "Apache-2.0"
    install: |
      bin.install "argus-agent"
    test: |
      system "#{bin}/argus-agent", "--version"

release:
  github:
    owner: kairos-dev-kairos-ecl
    name: ArgusSDK
  draft: true
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
