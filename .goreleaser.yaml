# GoReleaser configuration for argus-agent.
# Local dry run:  goreleaser release --snapshot --clean --skip=publish,sign,notarize
# Validate:       goreleaser check
#
# Signing/notarization run only on `goreleaser release` (a tag build in CI) and
# are gated on the presence of the relevant secrets, so snapshot builds work
# without certificates. See docs/RELEASING.md for the required secrets.
version: 2

project_name: argus-agent

before:
  hooks:
    - go mod tidy

# Windows-only release. Linux/macOS detection is unverified, so their packages
# are intentionally NOT published (honesty over breadth). The Linux/macOS build
# is still exercised by the CI cross-compile job, and the packaging assets under
# packaging/ remain in-tree for contributors. See README "Capabilities".
builds:
  - id: argus-agent
    main: ./cmd/argus-agent
    binary: argus-agent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - argus-agent
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - CHANGELOG.md
      - config/agent.default.yaml
      - config/agent.example.yaml

checksum:
  name_template: "checksums.txt"

# Keyless signing of the checksums file with Sigstore cosign. This is FREE and
# uses the workflow's GitHub OIDC identity — no secrets, no key to manage. It
# emits checksums.txt.sig + checksums.txt.pem, verifiable with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/kairos-dev-kairos-ecl/ArgusSDK/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com checksums.txt
signs:
  - id: cosign-checksum
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Homebrew distribution (free macOS/Linux CLI install, no Gatekeeper friction)
# is documented in docs/RELEASING.md as an opt-in step. It is intentionally not
# configured here yet — it requires a separate tap repo + token, and is added
# with the current schema when activated.

release:
  github:
    owner: kairos-dev-kairos-ecl
    name: ArgusSDK
  draft: true
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
